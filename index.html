<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --surface3: #242424;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.12);
      --text: #f0ede8;
      --muted: #666;
      --muted2: #999;
      --accent: #e02020;
      --accent2: #ff3333;
      --accent-glow: rgba(224,32,32,0.15);
      --sidebar-w: 240px;
      --player-h: 72px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    /* ── LAYOUT ── */
    #app { display: grid; grid-template-rows: 60px 1fr var(--player-h); height: 100vh; }
    #main { display: grid; grid-template-columns: var(--sidebar-w) 1fr; overflow: hidden; }
    #content { overflow-y: auto; padding: 28px 32px; background: var(--bg); }
    #content::-webkit-scrollbar { width: 3px; }
    #content::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* ── TOPBAR ── */
    #topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #menu-btn { display: none; background: none; border: none; color: var(--muted2); font-size: 20px; cursor: pointer; flex-shrink: 0; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 3px; flex-shrink: 0; }
    .logo-stage { color: var(--text); }
    .logo-vault { color: var(--accent); }
    #search-wrap {
      flex: 1; max-width: 360px; display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; transition: border-color 0.2s;
    }
    #search-wrap:focus-within { border-color: var(--accent); }
    #search-wrap svg { color: var(--muted); flex-shrink: 0; }
    #search-input { background: none; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); width: 100%; }
    #search-input::placeholder { color: var(--muted); }
    #topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    #user-info { display: flex; align-items: center; gap: 8px; }
    #user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--accent); }
    #user-name { font-size: 13px; color: var(--muted2); }
    #logout-btn { font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: 6px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
    #logout-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── SIDEBAR ── */
    #sidebar {
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden;
      transition: transform 0.25s ease;
    }
    #sidebar::-webkit-scrollbar { width: 0; }
    .sidebar-section { padding: 20px 0 8px; }
    .nav-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--muted);
      padding: 0 20px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; font-size: 13px; color: var(--muted2);
      cursor: pointer; transition: all 0.15s; position: relative;
      user-select: none;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--text); }
    .nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-badge { margin-left: auto; font-size: 11px; color: var(--muted); background: var(--surface2); padding: 1px 7px; border-radius: 10px; }

    /* Carpetas colapsables */
    .folder-group { border-top: 1px solid var(--border); margin-top: 4px; }
    .folder-parent {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; font-size: 13px; color: var(--muted2);
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .folder-parent:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .folder-parent.active { color: var(--text); }
    .folder-chevron { margin-left: auto; font-size: 11px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
    .folder-chevron.open { transform: rotate(90deg); }
    .folder-children { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
    .folder-children.open { max-height: 500px; }
    .folder-child {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 20px 7px 44px; font-size: 12px; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .folder-child:hover { color: var(--muted2); background: rgba(255,255,255,0.02); }
    .folder-child.active { color: var(--accent); }
    .folder-child-count { margin-left: auto; font-size: 11px; color: #3a3a3a; }
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 49; }

    /* ── SECTION TITLES ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; margin-top: 4px; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 0.3px; }
    .section-more { font-size: 12px; color: var(--muted); cursor: pointer; transition: color 0.15s; }
    .section-more:hover { color: var(--accent); }
    .section-divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── MEDIA GRID ── */
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 8px; }
    .media-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .media-card:hover { border-color: rgba(224,32,32,0.3); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .media-card:hover .card-overlay { opacity: 1; }
    .media-card:hover .fav-btn { opacity: 1; }

    /* Thumb 16:9 para videos */
    .card-thumb {
      aspect-ratio: 16/9; background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; position: relative; overflow: hidden;
    }
    /* Thumb 1:1 para audio */
    .card-thumb.sq {
      aspect-ratio: 1/1;
      background: linear-gradient(145deg, #1a0a0a 0%, #2a0a0a 40%, #1a0505 100%);
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s;
    }
    .play-btn-circle {
      width: 40px; height: 40px; background: var(--accent);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 15px; box-shadow: 0 4px 16px rgba(224,32,32,0.5);
    }
    .card-duration {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.8); font-size: 10px; color: #ccc;
      padding: 2px 6px; border-radius: 4px; font-variant-numeric: tabular-nums;
    }
    .card-type-badge {
      position: absolute; top: 6px; left: 6px;
      background: var(--accent); font-size: 9px; font-weight: 600;
      letter-spacing: 0.5px; color: #fff; padding: 2px 6px; border-radius: 3px;
    }
    .fav-btn {
      position: absolute; top: 6px; right: 6px; width: 28px; height: 28px;
      border-radius: 50%; background: rgba(0,0,0,0.7); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
      opacity: 0; transition: opacity 0.2s, transform 0.15s; z-index: 2;
      color: var(--muted2);
    }
    .fav-btn:hover { transform: scale(1.2); }
    .fav-btn.active { opacity: 1; color: var(--accent); }
    .card-info { padding: 10px 12px 12px; }
    .card-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Vinyl decoration for audio without cover */
    .vinyl-deco { position: absolute; right: -18px; bottom: -18px; width: 80px; height: 80px; border-radius: 50%; background: repeating-radial-gradient(circle at center, #1a0a0a 0px, #1a0a0a 4px, #2a0a0a 5px, #2a0a0a 8px); opacity: 0.4; pointer-events: none; }
    .audio-note { font-size: 32px; position: relative; z-index: 1; }

    /* ── PLAYER BAR ── */
    #player-bar {
      display: flex; align-items: center; gap: 16px; padding: 0 24px;
      background: var(--surface); border-top: 1px solid var(--border);
    }
    #player-thumb {
      width: 44px; height: 44px; border-radius: 6px; background: var(--surface2);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      flex-shrink: 0; overflow: hidden; border: 1px solid var(--border);
    }
    #player-thumb img { width: 100%; height: 100%; object-fit: cover; }
    #player-info { min-width: 0; flex: 0 0 200px; }
    #player-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #player-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    #player-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    #player-controls { display: flex; align-items: center; gap: 16px; }
    .ctrl { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; transition: color 0.15s; }
    .ctrl:hover { color: var(--text); }
    #play-pause {
      width: 36px; height: 36px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; color: #fff; font-size: 13px;
      box-shadow: 0 2px 10px rgba(224,32,32,0.4); transition: background 0.15s;
    }
    #play-pause:hover { background: var(--accent2); }
    #progress-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 400px; }
    #progress-bar { flex: 1; height: 3px; background: var(--surface3); border-radius: 2px; cursor: pointer; position: relative; }
    #progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; }
    .time-label { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    #vol-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #vol-wrap span { font-size: 14px; color: var(--muted); }
    #volume-slider { width: 70px; accent-color: var(--accent); }

    /* ── MODAL VIDEO ── */
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    #modal.open { display: flex; }
    #modal-inner { position: relative; width: 100%; max-width: 960px; }
    #modal-iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; background: #000; }
    #modal-close { position: absolute; top: -42px; right: 0; background: none; border: none; color: var(--muted2); font-size: 26px; cursor: pointer; }
    #modal-close:hover { color: var(--text); }
    #modal-footer { display: flex; align-items: center; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
    #modal-title { font-size: 16px; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #modal-sub-text { font-size: 12px; color: var(--muted); }
    #modal-fav-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 12px; font-size: 12px; color: var(--muted2); cursor: pointer; }
    #modal-fav-btn.active { border-color: var(--accent); color: var(--accent); }
    #modal-gdrive-btn { font-size: 12px; color: var(--muted); text-decoration: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; }

    /* ── MODAL AUDIO ── */
    #audio-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    #audio-modal.open { display: flex; }
    #audio-modal-inner {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 16px; padding: 36px 32px; width: 100%; max-width: 400px;
      text-align: center; position: relative;
    }
    #audio-modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    #audio-cover-wrap { width: 180px; height: 180px; border-radius: 12px; margin: 0 auto 20px; overflow: hidden; background: linear-gradient(145deg, #1a0a0a, #2a0505); display: flex; align-items: center; justify-content: center; font-size: 52px; border: 1px solid var(--border2); position: relative; }
    #audio-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
    #audio-modal-title { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    #audio-modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    #audio-el { width: 100%; accent-color: var(--accent); margin-bottom: 12px; }
    .audio-btns { display: flex; align-items: center; justify-content: center; gap: 20px; }
    .audio-ctrl { background: none; border: none; color: var(--muted2); font-size: 22px; cursor: pointer; transition: color 0.15s; }
    .audio-ctrl:hover { color: var(--text); }
    #audio-play-btn {
      width: 50px; height: 50px; background: var(--accent); border-radius: 50%;
      border: none; cursor: pointer; color: #fff; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(224,32,32,0.4);
    }

    /* ── LOGIN ── */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; text-align: center; padding: 20px; }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 60px; letter-spacing: 5px; }
    .login-stage { color: var(--text); }
    .login-vault { color: var(--accent); }
    .login-sub { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.7; }
    #login-big-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--accent); color: #fff; font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500; border: none; border-radius: 8px;
      padding: 12px 28px; cursor: pointer; margin-top: 8px;
      transition: background 0.15s; box-shadow: 0 4px 20px rgba(224,32,32,0.3);
    }
    #login-big-btn:hover { background: var(--accent2); }

    /* ── STATES ── */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 220px; gap: 12px; color: var(--muted); text-align: center; }
    .empty-icon { font-size: 40px; opacity: 0.25; }
    .empty-text { font-size: 14px; }
    .loading-dots { display: flex; gap: 6px; align-items: center; justify-content: center; padding: 80px; }
    .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.7)} 40%{opacity:1;transform:scale(1)} }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      :root { --sidebar-w: 0px; }
      #menu-btn { display: flex; }
      #main { grid-template-columns: 1fr; }
      #sidebar { position: fixed; top: 60px; left: 0; bottom: var(--player-h); width: 260px; z-index: 50; transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #content { padding: 16px; }
      #search-wrap { max-width: none; }
      #user-name { display: none; }
      #player-center { display: none; }
      #vol-wrap { display: none; }
      #player-info { flex: 1; }
      .media-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .fav-btn { opacity: 1; }
      #modal { padding: 0; align-items: flex-end; }
      #modal-inner { border-radius: 12px 12px 0 0; background: #111; overflow: hidden; }
      #modal-iframe { border-radius: 0; }
      #modal-close { top: 10px; right: 12px; color: #fff; background: rgba(0,0,0,0.6); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; position: absolute; z-index: 2; }
      #modal-footer { padding: 12px 16px 20px; }
    }
    @media (min-width: 641px) and (max-width: 960px) {
      :root { --sidebar-w: 200px; }
      .media-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      #vol-wrap { display: none; }
    }


  </style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo"><span class="logo-stage">STAGE</span><span class="logo-vault">VAULT</span></div>
    <div id="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar videos, audios..." />
    </div>
    <div id="topbar-right">
      <div id="auth-area">
        <button id="login-btn" onclick="signIn()" style="display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Iniciar sesión
        </button>
      </div>
    </div>
  </div>

  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- MAIN -->
  <div id="main">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="nav-label">Biblioteca</div>
        <div class="nav-item active" onclick="setView('home');closeSidebar()">
          <span class="nav-icon">⊞</span> Inicio
        </div>
        <div class="nav-item" onclick="setView('videos');closeSidebar()">
          <span class="nav-icon">▶</span> Videos
          <span class="nav-badge" id="badge-videos">0</span>
        </div>
        <div class="nav-item" onclick="setView('audio');closeSidebar()">
          <span class="nav-icon">♪</span> Audio
          <span class="nav-badge" id="badge-audio">0</span>
        </div>
        <div class="nav-item" onclick="setView('recent');closeSidebar()">
          <span class="nav-icon">◷</span> Recientes
        </div>
        <div class="nav-item" onclick="setView('favorites');closeSidebar()">
          <span class="nav-icon">♡</span> Favoritos
        </div>
      </div>
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <div class="sidebar-section">
        <div class="nav-label">Streaming</div>
      </div>
      <div class="sidebar-section" style="flex:1">
        <div class="nav-label">Carpetas</div>
        <div id="sidebar-folders"></div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <div id="login-screen" style="display:none">
        <div class="login-logo"><span class="login-stage">STAGE</span><span class="login-vault">VAULT</span></div>
        <p class="login-sub">Tu colección de conciertos y música, organizada desde Google Drive.</p>
        <button id="login-big-btn" onclick="signIn()">

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
const API_KEY   = 'AIzaSyDKmxzhHqaKHFgdprHCKb9FXkE9Pc7phTk';
const CLIENT_ID = '1071215016809-40qgvarv6lpv0rkt1205str7edftmk2v.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.readonly';
const ROOT_NAME = 'StageVault';

const VIDEO_TYPES = ["video/mp4","video/webm","video/quicktime","video/x-msvideo","video/x-matroska","video/mpeg","video/3gpp","video/ogg"];
const AUDIO_TYPES = ["audio/mpeg","audio/mp4","audio/ogg","audio/wav","audio/flac","audio/aac","audio/x-flac"];
const IMAGE_TYPES = ["image/jpeg","image/jpg","image/png","image/webp","image/gif"];
const ALL_TYPES   = [...VIDEO_TYPES, ...AUDIO_TYPES, ...IMAGE_TYPES];

let tokenClient, accessToken = null;
let allFiles = [], allVideos = [], allAudio = [];
let coverMap = {};
// folderTree: [{id, name, children:[{id,name,count}], count}]
let folderTree = [], flatFolders = [];
let currentFolderParentMap = {};
let currentPlaylist = [], currentIdx = 0, currentItem = null;
let favorites = JSON.parse(localStorage.getItem('sv_favs')   || '[]');
let recentIds = JSON.parse(localStorage.getItem('sv_recent') || '[]');

// ── INIT ──
window.onload = () => {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => { if (!resp.error) { accessToken = resp.access_token; onSignedIn(); } }
    });
    showLoginScreen();
  });
};

function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('home-view').style.display = 'none';
}
function signIn() { tokenClient.requestAccessToken({ prompt: '' }); }
function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; allFiles = []; allVideos = []; allAudio = []; flatFolders = []; folderTree = [];
  document.getElementById('auth-area').innerHTML = `<button onclick="signIn()" style="display:flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;">Iniciar sesión</button>`;
  showLoginScreen();
}

async function onSignedIn() {
  try {
    const me = await gapi.client.request({ path: 'https://www.googleapis.com/oauth2/v2/userinfo' });
    const u = me.result;
    document.getElementById('auth-area').innerHTML = `
      <div id="user-info">
        <img id="user-avatar" src="${u.picture}" />
        <span id="user-name">${u.given_name}</span>
        <button id="logout-btn" onclick="signOut()">Salir</button>
      </div>`;
  } catch(e) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('home-view').innerHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  await loadFiles();
  renderSidebar();
  renderHomeView();
}

// ── CARGA ──
async function loadFiles() {
  const rootRes = await gapi.client.drive.files.list({
    q: `name='${ROOT_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: 'files(id,name)', pageSize: 5
  });
  if (!rootRes.result.files?.length) {
    document.getElementById('home-view').innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-text">No encontré la carpeta "${ROOT_NAME}" en tu Drive.</div></div>`;
    return;
  }
  const rootId = rootRes.result.files[0].id;
  console.log('[StageVault] Carpeta StageVault encontrada, ID:', rootId);

  // Recopilar carpetas con árbol (solo un nivel de profundidad para el sidebar)
  const allFolderIds = [rootId];
  const folderNames  = { [rootId]: ROOT_NAME };
  const folderParent = { [rootId]: null };

  // Recopilar carpetas recursivamente
  async function scanFolders(parentId, depth) {
    if (depth > 4) return; // máximo 4 niveles
    const res = await gapi.client.drive.files.list({
      q: `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: 'files(id,name)', pageSize: 100
    });
    for (const f of (res.result.files || [])) {
      allFolderIds.push(f.id);
      folderNames[f.id] = f.name;
      folderParent[f.id] = parentId;
      await scanFolders(f.id, depth + 1);
    }
  }
  await scanFolders(rootId, 0);
  console.log('[StageVault] Carpetas totales encontradas:', allFolderIds.length - 1, allFolderIds.slice(1).map(id=>folderNames[id]));
  const lvl1 = allFolderIds.filter(id => folderParent[id] === rootId).map(id => ({ id }));

  // Cargar archivos
  const mimeQ = ALL_TYPES.map(m => `mimeType='${m}'`).join(' or ');
  let rawFiles = [];
  for (const chunk of chunkArray(allFolderIds, 10)) {
    const parentQ = chunk.map(id => `'${id}' in parents`).join(' or ');
    let pageToken = '';
    do {
      const res = await gapi.client.drive.files.list({
        q: `(${parentQ}) and (${mimeQ}) and trashed=false`,
        fields: 'nextPageToken,files(id,name,mimeType,size,modifiedTime,thumbnailLink,videoMediaMetadata,parents)',
        pageSize: 100, pageToken, orderBy: 'name'
      });
      rawFiles = rawFiles.concat(res.result.files || []);
      pageToken = res.result.nextPageToken || '';
    } while (pageToken);
  }
  const seen = new Set();
  rawFiles = rawFiles.filter(f => { if (seen.has(f.id)) return false; seen.add(f.id); return true; });

  // Portadas
  rawFiles.filter(f => IMAGE_TYPES.includes(f.mimeType)).forEach(img => {
    const key = img.name.replace(/\.[^/.]+$/, '').toLowerCase();
    coverMap[key] = img.thumbnailLink
      ? img.thumbnailLink.replace('=s220','=s400')
      : `https://drive.google.com/thumbnail?id=${img.id}&sz=s400`;
  });

  // Mapear archivos multimedia (excluir imágenes)
  allFiles = rawFiles.filter(f => !IMAGE_TYPES.includes(f.mimeType)).map(f => {
    const folderId  = f.parents?.[0] || rootId;
    const nameClean = f.name.replace(/\.[^/.]+$/, '');
    const cover     = coverMap[nameClean.toLowerCase()] || f.thumbnailLink || null;
    const isVideo   = VIDEO_TYPES.includes(f.mimeType);
    return {
      ...f, folderId, nameClean, cover,
      folderName: folderNames[folderId] || ROOT_NAME,
      type: isVideo ? 'video' : 'audio',
      duration: f.videoMediaMetadata ? formatDuration(f.videoMediaMetadata.durationMillis) : '',
      driveUrl:  `https://drive.google.com/file/d/${f.id}/view`,
      embedUrl:  `https://drive.google.com/file/d/${f.id}/preview`,
      streamUrl: `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
    };
  }).sort((a,b) => a.nameClean.localeCompare(b.nameClean));

  allVideos = allFiles.filter(f => f.type === 'video');
  allAudio  = allFiles.filter(f => f.type === 'audio');

  console.log('[StageVault] Archivos multimedia encontrados:', allFiles.length, '(videos:', allVideos.length, ', audio:', allAudio.length, ')');

  // Actualizar badges
  document.getElementById('badge-videos').textContent = allVideos.length;
  document.getElementById('badge-audio').textContent  = allAudio.length;

  // Construir árbol de carpetas para sidebar.
  // Contamos archivos DIRECTOS por carpeta, y luego acumulamos hacia arriba
  // para que una carpeta padre muestre el total incluyendo subcarpetas.
  const directCounts = {};
  allFiles.forEach(f => { directCounts[f.folderId] = (directCounts[f.folderId] || 0) + 1; });

  const totalCounts = { ...directCounts };
  // Sumar hacia arriba: para cada carpeta con archivos, sumar su conteo a todos sus ancestros
  Object.keys(directCounts).forEach(fid => {
    let current = folderParent[fid];
    while (current) {
      totalCounts[current] = (totalCounts[current] || 0) + directCounts[fid];
      current = folderParent[current];
    }
  });

  console.log('[StageVault] Conteo de archivos por carpeta (incluye subcarpetas):',
    Object.entries(totalCounts).map(([id,count]) => `${folderNames[id]||id}: ${count}`));

  flatFolders = allFolderIds
    .filter(id => id !== rootId && totalCounts[id])
    .map(id => ({ id, name: folderNames[id], parentId: folderParent[id], count: totalCounts[id] || 0 }))
    .sort((a,b) => a.name.localeCompare(b.name));

  // Árbol: nivel 1 = hijos directos del root; nivel 2+ = sus hijos (aplanados bajo el padre directo)
  folderTree = flatFolders
    .filter(f => f.parentId === rootId)
    .map(parent => ({
      ...parent,
      children: flatFolders.filter(c => c.parentId === parent.id || isDescendantOf(c.id, parent.id, folderParent))
                            .filter(c => c.parentId !== rootId) // evitar duplicar al padre mismo
    }));

  // Si root tiene archivos directos, agregar como sección "General"
  if (directCounts[rootId]) {
    folderTree.unshift({ id: rootId, name: ROOT_NAME, parentId: null, count: directCounts[rootId], children: [] });
  }

  console.log('[StageVault] Árbol final para sidebar:', folderTree.map(p => ({ nombre: p.name, hijos: p.children.map(c=>c.name) })));
  currentFolderParentMap = folderParent;
}

function isDescendantOf(id, ancestorId, parentMap) {
  let current = parentMap[id];
  while (current) {
    if (current === ancestorId) return true;
    current = parentMap[current];
  }
  return false;
}

function chunkArray(arr, size) { const c=[]; for(let i=0;i<arr.length;i+=size) c.push(arr.slice(i,i+size)); return c; }

// ── SIDEBAR ──
function renderSidebar() {
  document.getElementById('sidebar-folders').innerHTML = folderTree.map(parent => {
    const hasChildren = parent.children.length > 0;
    const childrenHtml = hasChildren ? parent.children.map(c =>
      `<div class="folder-child" onclick="setView('folder:${c.id}');closeSidebar()">
        <span style="font-size:11px">📁</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span>
        <span class="folder-child-count">${c.count}</span>
      </div>`).join('') : '';
    return `<div class="folder-group">
      <div class="folder-parent" id="fp-${parent.id}" onclick="toggleFolder('${parent.id}')">
        <span style="font-size:13px">📁</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px">${esc(parent.name)}</span>
        <span style="font-size:11px;color:var(--muted);margin-right:4px">${parent.count}</span>
        ${hasChildren ? `<span class="folder-chevron" id="chev-${parent.id}">›</span>` : ''}
      </div>
      ${hasChildren ? `<div class="folder-children" id="fc-${parent.id}">${childrenHtml}</div>` : ''}
    </div>`;
  }).join('');

  // Click en carpeta padre sin hijos → navegar directo
  folderTree.forEach(parent => {
    if (!parent.children.length) {
      document.getElementById(`fp-${parent.id}`)?.addEventListener('click', (e) => {
        setView(`folder:${parent.id}`); closeSidebar();
      });
    }
  });
}

function toggleFolder(id) {
  const parent = folderTree.find(f => f.id === id);
  if (!parent?.children.length) { setView(`folder:${id}`); closeSidebar(); return; }
  const fc   = document.getElementById(`fc-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  if (fc) fc.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

// ── RENDER HOME ──
function renderHomeView() {
  if (!allFiles.length) {
    document.getElementById('home-view').innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-text">No encontré archivos en "${ROOT_NAME}".</div></div>`;
    return;
  }
  const recent = recentIds.map(id => allFiles.find(f => f.id === id)).filter(Boolean).slice(0,8);
  let html = '';
  if (recent.length) {
    html += `<div class="section-header"><span class="section-title">Recientes</span><span class="section-more" onclick="setView('recent')">Ver todos</span></div>
    <div class="media-grid">${recent.map(mediaCardHtml).join('')}</div><div class="section-divider"></div>`;
  }
  if (allVideos.length) {
    html += `<div class="section-header"><span class="section-title">Videos</span><span class="section-more" onclick="setView('videos')">Ver todos · ${allVideos.length}</span></div>
    <div class="media-grid">${allVideos.slice(0,8).map(mediaCardHtml).join('')}</div><div class="section-divider"></div>`;
  }
  if (allAudio.length) {
    html += `<div class="section-header"><span class="section-title">Audio</span><span class="section-more" onclick="setView('audio')">Ver todos · ${allAudio.length}</span></div>
    <div class="media-grid">${allAudio.slice(0,8).map(mediaCardHtml).join('')}</div>`;
  }
  document.getElementById('home-view').innerHTML = html;
}

function mediaCardHtml(f) {
  const isAudio = f.type === 'audio';
  const isFav   = favorites.includes(f.id);
  const thumbClass = isAudio ? 'card-thumb sq' : 'card-thumb';
  const thumbContent = f.cover
    ? `<img src="${f.cover}" alt="" onerror="this.style.display='none'" />`
    : isAudio
      ? `<span class="audio-note">🎵</span><div class="vinyl-deco"></div>`
      : `<span style="font-size:28px;opacity:.3">▶</span>`;
  return `<div class="media-card">
    <div class="${thumbClass}" onclick="openItem('${f.id}')">
      ${thumbContent}
      <div class="card-overlay"><div class="play-btn-circle">${isAudio?'♪':'▶'}</div></div>
      ${f.duration ? `<div class="card-duration">${f.duration}</div>` : ''}
      ${isAudio ? `<div class="card-type-badge">AUDIO</div>` : ''}
    </div>
    <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${f.id}',event)">${isFav?'♥':'♡'}</button>
    <div class="card-info" onclick="openItem('${f.id}')">
      <div class="card-name" title="${esc(f.nameClean)}">${esc(f.nameClean)}</div>
      <div class="card-sub">${esc(f.folderName)}</div>
    </div>
  </div>`;
}

// ── VISTAS ──
function setView(view) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelectorAll('.nav-item');
  if (view==='home')      { nav[0].classList.add('active'); renderHomeView(); return; }
  if (view==='videos')    { nav[1].classList.add('active'); renderList('Videos', allVideos); return; }
  if (view==='audio')     { nav[2].classList.add('active'); renderList('Audio', allAudio); return; }
  if (view==='recent')    { nav[3].classList.add('active'); renderList('Recientes', recentIds.map(id=>allFiles.find(f=>f.id===id)).filter(Boolean)); return; }
  if (view==='favorites') { nav[4].classList.add('active'); renderList('Favoritos', allFiles.filter(f=>favorites.includes(f.id))); return; }
  if (view.startsWith('folder:')) {
    const fid   = view.split(':')[1];
    const fname = flatFolders.find(f=>f.id===fid)?.name || folderTree.find(f=>f.id===fid)?.name || 'Carpeta';
    // Incluye archivos de la carpeta Y de todas sus subcarpetas
    const items = allFiles
      .filter(f => f.folderId === fid || isDescendantOf(f.folderId, fid, currentFolderParentMap))
      .sort((a,b)=>a.nameClean.localeCompare(b.nameClean));
    renderList(fname, items);
  }
}

function renderList(title, items) {
  if (!items.length) {
    document.getElementById('home-view').innerHTML = `<div class="section-header"><span class="section-title">${title}</span></div><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No hay archivos aquí</div></div>`;
    return;
  }
  const vids = items.filter(f=>f.type==='video');
  const auds = items.filter(f=>f.type==='audio');
  let html = `<div class="section-header"><span class="section-title">${esc(title)}</span><span style="font-size:12px;color:var(--muted)">${items.length} archivos</span></div>`;
  if (vids.length) html += `<div class="media-grid">${vids.map(mediaCardHtml).join('')}</div>`;
  if (vids.length && auds.length) html += `<div class="section-divider"></div><div class="section-header"><span class="section-title">Audio</span></div>`;
  if (auds.length) html += `<div class="media-grid">${auds.map(mediaCardHtml).join('')}</div>`;
  document.getElementById('home-view').innerHTML = html;
}

// ── BÚSQUEDA ──
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderHomeView(); return; }
  const results = allFiles.filter(f => f.nameClean.toLowerCase().includes(q) || f.folderName.toLowerCase().includes(q));
  renderList(`"${this.value}"`, results);
});

// ── SIDEBAR MOBILE ──
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar()  { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

// ── FAVORITOS ──
function toggleFav(id, e) {
  if (e) e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(x=>x!==id) : [...favorites, id];
  localStorage.setItem('sv_favs', JSON.stringify(favorites));
  if (e) { const btn=e.currentTarget; btn.textContent=favorites.includes(id)?'♥':'♡'; btn.classList.toggle('active',favorites.includes(id)); }
  if (currentItem?.id===id) updateModalFavBtn();
}
function toggleFavCurrent() { if (currentItem) toggleFav(currentItem.id, null); }
function updateModalFavBtn() {
  const isFav = favorites.includes(currentItem?.id);
  const btn = document.getElementById('modal-fav-btn');
  if (btn) { btn.textContent=isFav?'♥ Favorito':'♡ Favorito'; btn.classList.toggle('active',isFav); }
}

// ── REPRODUCCIÓN ──
function openItem(id) {
  const item = allFiles.find(f => f.id === id);
  if (!item) return;
  if (item.type==='audio') openAudio(item); else openVideo(item);
}

function openVideo(item) {
  currentItem = item;
  currentPlaylist = allVideos; currentIdx = allVideos.findIndex(f=>f.id===item.id);
  updateRecent(item.id); updatePlayerBar(item);
  document.getElementById('modal-iframe').src = item.embedUrl;
  document.getElementById('modal-title').textContent = item.nameClean;
  document.getElementById('modal-sub-text').textContent = item.folderName + (item.duration?' · '+item.duration:'');
  document.getElementById('modal-gdrive-btn').href = item.driveUrl;
  updateModalFavBtn();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-iframe').src=''; }

function openAudio(item) {
  currentItem = item;
  currentPlaylist = allAudio; currentIdx = allAudio.findIndex(f=>f.id===item.id);
  updateRecent(item.id); updatePlayerBar(item);
  const wrap = document.getElementById('audio-cover-wrap');
  wrap.innerHTML = item.cover ? `<img src="${item.cover}" alt="" />` : '🎵';
  document.getElementById('audio-modal-title').textContent = item.nameClean;
  document.getElementById('audio-modal-sub').textContent = item.folderName;
  const el = document.getElementById('audio-el');
  el.src = item.streamUrl + `&access_token=${accessToken}`;
  el.load();
  document.getElementById('audio-modal').classList.add('open');
  el.play().catch(()=>{});
}
function closeAudioModal() { document.getElementById('audio-modal').classList.remove('open'); document.getElementById('audio-el').pause(); }
function toggleAudioPlay() {
  const a = document.getElementById('audio-el');
  const btn = document.getElementById('audio-play-btn');
  if (a.paused) { a.play(); btn.textContent='⏸'; } else { a.pause(); btn.textContent='▶'; }
}
document.getElementById('audio-el').addEventListener('ended', nextItem);

function updatePlayerBar(item) {
  document.getElementById('player-title').textContent = item.nameClean;
  document.getElementById('player-sub').textContent   = item.folderName;
  document.getElementById('player-thumb').innerHTML   = item.cover ? `<img src="${item.cover}" alt="" />` : (item.type==='audio'?'🎵':'🎬');
}
function updateRecent(id) { recentIds=[id,...recentIds.filter(x=>x!==id)].slice(0,20); localStorage.setItem('sv_recent',JSON.stringify(recentIds)); }
function togglePlay() { if (currentItem) { if(currentItem.type==='audio') document.getElementById('audio-modal').classList.add('open'); else document.getElementById('modal').classList.add('open'); } }
function prevItem() { if(!currentPlaylist.length) return; currentIdx=(currentIdx-1+currentPlaylist.length)%currentPlaylist.length; openItem(currentPlaylist[currentIdx].id); }
function nextItem() { if(!currentPlaylist.length) return; currentIdx=(currentIdx+1)%currentPlaylist.length; openItem(currentPlaylist[currentIdx].id); }
function setVolume(v) { document.getElementById('audio-el').volume=v/100; }

document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeAudioModal(); } });
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('audio-modal').addEventListener('click', function(e){ if(e.target===this) closeAudioModal(); });




function formatDuration(ms) { if(!ms)return''; const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${m}:${String(s%60).padStart(2,'0')}`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
