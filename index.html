<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111111; --surface2: #181818;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #f0ede8; --muted: #888; --accent: #c8f060; --accent2: #a8d040;
      --player-h: 72px; --sidebar-w: 220px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
    #app { display: grid; grid-template-rows: 56px 1fr var(--player-h); height: 100vh; }
    #main { display: grid; grid-template-columns: var(--sidebar-w) 1fr; overflow: hidden; position: relative; }
    #content { overflow-y: auto; padding: 24px 28px 20px; }

    /* TOPBAR */
    #topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--bg); gap: 12px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--text); flex-shrink: 0; }
    .logo span { color: var(--accent); }
    #search-wrap { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; flex: 1; max-width: 300px; }
    #search-wrap input { background: none; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); width: 100%; }
    #search-wrap input::placeholder { color: var(--muted); }
    #login-btn { display: flex; align-items: center; gap: 8px; background: var(--accent); color: #111; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; border: none; border-radius: 20px; padding: 7px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    #user-info { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--accent); }
    #user-name { font-size: 13px; color: var(--muted); }
    #logout-btn { font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border); border-radius: 12px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
    #menu-btn { display: none; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px; flex-shrink: 0; }

    /* SIDEBAR */
    #sidebar { border-right: 1px solid var(--border); padding: 16px 0; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; transition: transform 0.25s ease; }
    .nav-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 10px 20px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; font-size: 13px; color: var(--muted); cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; }
    .nav-item:hover { color: var(--text); background: var(--surface); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,240,96,0.05); }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; }
    .folder-item { padding-left: 28px; font-size: 12px; }
    .folder-count { margin-left: auto; font-size: 11px; color: #555; }
    #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 49; }

    /* HERO */
    #hero { position: relative; height: 220px; border-radius: 12px; overflow: hidden; margin-bottom: 24px; display: flex; align-items: flex-end; padding: 20px; border: 1px solid var(--border); background: linear-gradient(135deg, #0f1f00 0%, #1a3300 40%, #0a1500 100%); }
    .hero-bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; }
    .hero-glow { position: absolute; top: -60px; right: -60px; width: 280px; height: 280px; background: radial-gradient(circle, rgba(200,240,96,0.12) 0%, transparent 70%); pointer-events: none; }
    .hero-content { position: relative; z-index: 1; }
    .hero-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1.1; color: var(--text); margin-bottom: 6px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .hero-meta { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .hero-play { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #111; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; border: none; border-radius: 20px; padding: 8px 18px; cursor: pointer; }
    .hero-play:hover { background: var(--accent2); }

    /* SECTIONS */
    .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 1px; color: var(--text); }
    .section-more { font-size: 12px; color: var(--muted); cursor: pointer; }
    .section-more:hover { color: var(--accent); }

    /* VIDEO / AUDIO GRID */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .media-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.2s; position: relative; }
    .media-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .media-card:hover .card-overlay { opacity: 1; }
    .media-card:hover .fav-btn { opacity: 1; }
    .card-thumb { aspect-ratio: 16/9; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; overflow: hidden; }
    .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .card-thumb.audio-square { aspect-ratio: 1/1; background: linear-gradient(135deg, #12122a 0%, #1a1a3a 50%, #0d0d1a 100%); border-radius: 6px 6px 0 0; }
    .card-thumb.audio-square img { border-radius: 0; }
    .album-vinyl { position: absolute; right: -20px; bottom: -20px; width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #222 20%, #111 21%, #333 40%, #111 41%, #1a1a1a 100%); opacity: 0.25; pointer-events: none; }
    .album-label { position: absolute; bottom: 8px; left: 10px; right: 10px; }
    .album-label-text { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); opacity: 0.7; }
    .card-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
    .play-circle { width: 38px; height: 38px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #111; font-size: 15px; }
    .card-info { padding: 9px 11px; }
    .card-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-duration { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.75); font-size: 10px; color: #ddd; padding: 2px 5px; border-radius: 4px; }
    .card-type-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.65); font-size: 10px; color: #aaa; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px; }
    .fav-btn { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.65); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; opacity: 0; transition: opacity 0.2s, transform 0.15s; z-index: 2; }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active { opacity: 1; }

    /* AUDIO CARD — thumb cuadrado con onda */
    .audio-thumb { aspect-ratio: 1/1; background: linear-gradient(135deg, #1a1a2e, #111); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
    .audio-icon { font-size: 28px; }
    .audio-wave { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
    .audio-bar { width: 3px; background: var(--accent); border-radius: 2px; opacity: 0.6; }

    /* PHOTO GRID — cuadrada */

    /* FOLDER PILLS */
    .folder-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .folder-pill { display: flex; align-items: center; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 13px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .folder-pill:hover { border-color: var(--accent); color: var(--accent); }

    /* TYPE FILTER TABS */
    .type-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .type-tab { padding: 5px 14px; border-radius: 16px; font-size: 12px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; background: var(--surface); }
    .type-tab:hover { border-color: var(--border2); color: var(--text); }
    .type-tab.active { background: rgba(200,240,96,0.1); border-color: var(--accent); color: var(--accent); }

    /* PLAYER BAR */
    #player-bar { display: flex; align-items: center; gap: 12px; padding: 0 16px; background: var(--surface); border-top: 1px solid var(--border); overflow: hidden; }
    #player-thumb { width: 42px; height: 42px; background: var(--surface2); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; overflow: hidden; }
    #player-thumb img { width: 100%; height: 100%; object-fit: cover; }
    #player-info { flex: 1; min-width: 0; }
    #player-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #player-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    #player-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .ctrl { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; transition: color 0.15s; }
    .ctrl:hover { color: var(--text); }
    #play-pause { width: 34px; height: 34px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; color: #111; font-size: 13px; flex-shrink: 0; }
    #progress-wrap { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; max-width: 280px; }
    #progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; cursor: pointer; }
    #progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }
    .time-label { font-size: 10px; color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
    #vol-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    #volume-slider { width: 60px; accent-color: var(--accent); }

    /* MODAL VIDEO */
    #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    #modal.open { display: flex; }
    #modal-inner { position: relative; width: 100%; max-width: 960px; }
    #modal-iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; background: #000; }
    #modal-close { position: absolute; top: -38px; right: 0; background: none; border: none; color: var(--muted); font-size: 26px; cursor: pointer; line-height: 1; }
    #modal-close:hover { color: var(--text); }
    #modal-footer { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    #modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #modal-sub-text { font-size: 12px; color: var(--muted); }
    #modal-fav-btn { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 5px 13px; font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; }
    #modal-fav-btn.active { background: rgba(200,240,96,0.1); border-color: var(--accent); color: var(--accent); }
    #modal-gdrive-btn { font-size: 12px; color: var(--muted); text-decoration: none; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 5px 13px; white-space: nowrap; }

    /* MODAL FOTO */

    /* MODAL AUDIO */
    #audio-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
    #audio-modal.open { display: flex; }
    #audio-modal-inner { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 32px; width: 100%; max-width: 420px; text-align: center; position: relative; }
    #audio-modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
    #audio-modal-cover { width: 160px; height: 160px; border-radius: 12px; object-fit: cover; margin: 0 auto 16px; display: block; background: var(--surface2); }
    #audio-modal-cover-placeholder { width: 160px; height: 160px; border-radius: 12px; background: linear-gradient(135deg,#1a1a2e,#111); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
    #audio-modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
    #audio-modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    #audio-el { width: 100%; accent-color: var(--accent); }
    .audio-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
    .audio-ctrl { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; transition: color 0.15s; }
    .audio-ctrl:hover { color: var(--text); }
    #audio-play-btn { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; border: none; cursor: pointer; color: #111; font-size: 18px; display: flex; align-items: center; justify-content: center; }

    /* LOGIN */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 14px; text-align: center; padding: 20px; }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; }
    .login-logo span { color: var(--accent); }
    .login-sub { font-size: 14px; color: var(--muted); max-width: 280px; line-height: 1.6; }
    #login-big-btn { display: flex; align-items: center; gap: 10px; background: var(--accent); color: #111; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; border: none; border-radius: 24px; padding: 11px 24px; cursor: pointer; margin-top: 6px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 10px; color: var(--muted); text-align: center; padding: 20px; }
    .empty-icon { font-size: 38px; opacity: 0.3; }
    .loading-dots { display: flex; gap: 6px; align-items: center; justify-content: center; padding: 60px; }
    .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    #content::-webkit-scrollbar { width: 4px; }
    #content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* MOBILE */
    @media (max-width: 640px) {
      #app { grid-template-rows: 52px 1fr var(--player-h); }
      #topbar { padding: 0 14px; }
      #menu-btn { display: flex; }
      #search-wrap { max-width: none; }
      #user-name { display: none; }
      #logout-btn { display: none; }
      #main { grid-template-columns: 1fr; }
      #sidebar { position: fixed; top: 52px; left: 0; bottom: var(--player-h); width: 260px; background: #0e0e0e; z-index: 50; transform: translateX(-100%); border-right: 1px solid var(--border2); }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay.open { display: block; }
      #content { padding: 16px 14px 16px; }
      #hero { height: 180px; padding: 14px; margin-bottom: 18px; }
      .hero-title { font-size: 24px; max-width: 240px; }
      .hero-meta { display: none; }
      .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .fav-btn { opacity: 1; }
      #progress-wrap { display: none; }
      #vol-wrap { display: none; }
      #player-sub { display: none; }
      #modal { padding: 0; align-items: flex-end; }
      #modal-inner { border-radius: 12px 12px 0 0; background: #0e0e0e; overflow: hidden; }
      #modal-iframe { border-radius: 0; }
      #modal-close { top: 10px; right: 12px; color: #fff; font-size: 20px; background: rgba(0,0,0,0.5); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; z-index: 2; }
      #modal-footer { padding: 10px 14px 16px; }
      #audio-modal-inner { padding: 24px 20px; }
    }
    @media (min-width: 641px) and (max-width: 900px) {
      :root { --sidebar-w: 180px; }
      .video-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      #progress-wrap { max-width: 180px; }
      #vol-wrap { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="logo">Stage<span>Vault</span></div>
    <div id="search-wrap">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:#666;flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Buscar..." />
    </div>
    <div id="auth-area">
      <button id="login-btn" onclick="signIn()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Conectar Drive
      </button>
    </div>
  </div>

  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div id="main">
    <div id="sidebar">
      <div class="nav-label">Navegar</div>
      <div class="nav-item active" onclick="setView('home');closeSidebar()"><span class="nav-icon">⊞</span> Inicio</div>
      <div class="nav-item" onclick="setView('videos');closeSidebar()"><span class="nav-icon">▶</span> Videos</div>
      <div class="nav-item" onclick="setView('audio');closeSidebar()"><span class="nav-icon">♪</span> Audio</div>
      <div class="nav-item" onclick="setView('recent');closeSidebar()"><span class="nav-icon">◷</span> Recientes</div>
      <div class="nav-item" onclick="setView('favorites');closeSidebar()"><span class="nav-icon">♡</span> Favoritos</div>
      <div class="nav-label" style="margin-top:8px">Carpetas</div>
      <div id="sidebar-folders"></div>
    </div>

    <div id="content">
      <div id="login-screen" style="display:none">
        <div class="login-logo">Stage<span>Vault</span></div>
        <p class="login-sub">Tu colección de conciertos, organizada y lista para reproducir desde Google Drive.</p>
        <button id="login-big-btn" onclick="signIn()">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Iniciar sesión con Google
        </button>
      </div>
      <div id="home-view"></div>
    </div>
  </div>

  <div id="player-bar">
    <div id="player-thumb">♪</div>
    <div id="player-info">
      <div id="player-title" style="color:var(--muted);font-size:12px">Ningún archivo seleccionado</div>
      <div id="player-sub"></div>
    </div>
    <div id="player-controls">
      <button class="ctrl" onclick="prevItem()">⏮</button>
      <button id="play-pause" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="nextItem()">⏭</button>
    </div>
    <div id="progress-wrap">
      <span class="time-label" id="time-current">0:00</span>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span class="time-label" id="time-total">--:--</span>
    </div>
    <div id="vol-wrap">
      <span style="font-size:13px;color:var(--muted)">🔊</span>
      <input type="range" id="volume-slider" min="0" max="100" value="80" />
    </div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div id="modal">
  <div id="modal-inner">
    <button id="modal-close" onclick="closeModal()">✕</button>
    <iframe id="modal-iframe" allowfullscreen></iframe>
    <div id="modal-footer">
      <div id="modal-title"></div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span id="modal-sub-text"></span>
        <button id="modal-fav-btn" onclick="toggleFavCurrent()">♡ Favorito</button>
        <a id="modal-gdrive-btn" href="#" target="_blank">↗ Drive</a>
      </div>
    </div>
  </div>
</div>

<!-- AUDIO MODAL -->
<div id="audio-modal">
  <div id="audio-modal-inner">
    <button id="audio-modal-close" onclick="closeAudioModal()">✕</button>
    <div id="audio-modal-cover-wrap"></div>
    <div id="audio-modal-title"></div>
    <div id="audio-modal-sub"></div>
    <audio id="audio-el" controls style="width:100%;margin-top:8px"></audio>
    <div class="audio-controls">
      <button class="audio-ctrl" onclick="prevItem()">⏮</button>
      <button id="audio-play-btn" onclick="toggleAudioPlay()">▶</button>
      <button class="audio-ctrl" onclick="nextItem()">⏭</button>
    </div>
  </div>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script>
const API_KEY   = 'AIzaSyDKmxzhHqaKHFgdprHCKb9FXkE9Pc7phTk';
const CLIENT_ID = '1071215016809-40qgvarv6lpv0rkt1205str7edftmk2v.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/drive.readonly';
const ROOT_NAME = 'StageVault';

const VIDEO_TYPES = ["video/mp4","video/webm","video/quicktime","video/x-msvideo","video/x-matroska","video/mpeg","video/3gpp","video/ogg"];
const AUDIO_TYPES = ["audio/mpeg","audio/mp4","audio/ogg","audio/wav","audio/flac","audio/aac","audio/x-flac"];
const IMAGE_TYPES = ["image/jpeg","image/jpg","image/png","image/webp","image/gif"];
const ALL_TYPES   = [...VIDEO_TYPES, ...AUDIO_TYPES, ...IMAGE_TYPES];

let tokenClient, accessToken = null;
let allFiles = [], allVideos = [], allAudio = [];
let coverMap = {}; // filename (sin ext) → thumbnailLink o driveUrl de imagen
let folders = [];
let currentPlaylist = [], currentIdx = 0, currentItem = null;
let favorites = JSON.parse(localStorage.getItem('sv_favs')   || '[]');
let recentIds = JSON.parse(localStorage.getItem('sv_recent') || '[]');

// ── INIT ──
window.onload = () => {
  gapi.load('client', async () => {
    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES,
      callback: (resp) => { if (!resp.error) { accessToken = resp.access_token; onSignedIn(); } }
    });
    showLoginScreen();
  });
};

function showLoginScreen() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('home-view').style.display = 'none';
}
function signIn() { tokenClient.requestAccessToken({ prompt: '' }); }
function signOut() {
  google.accounts.oauth2.revoke(accessToken, () => {});
  accessToken = null; allFiles = []; allVideos = []; allAudio = []; folders = [];
  document.getElementById('auth-area').innerHTML = `<button id="login-btn" onclick="signIn()">Conectar Drive</button>`;
  showLoginScreen();
}

async function onSignedIn() {
  try {
    const me = await gapi.client.request({ path: 'https://www.googleapis.com/oauth2/v2/userinfo' });
    const u = me.result;
    document.getElementById('auth-area').innerHTML = `<div id="user-info"><img id="user-avatar" src="${u.picture}" /><span id="user-name">${u.given_name}</span><button id="logout-btn" onclick="signOut()">Salir</button></div>`;
  } catch(e) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  document.getElementById('home-view').innerHTML = `<div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  await loadFiles();
  renderSidebar();
  renderHomeView();
}

// ── CARGA DE ARCHIVOS ──
async function loadFiles() {
  const rootRes = await gapi.client.drive.files.list({
    q: `name='${ROOT_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: 'files(id,name)', pageSize: 5
  });
  if (!rootRes.result.files || !rootRes.result.files.length) {
    document.getElementById('home-view').innerHTML = `<div class="empty-state"><div class="empty-icon">📁</div><div>No encontré la carpeta <strong style="color:var(--text)">"${ROOT_NAME}"</strong>.</div></div>`;
    return;
  }
  const rootId = rootRes.result.files[0].id;
  const allFolderIds = [rootId];
  const folderNames  = { [rootId]: ROOT_NAME };
  await collectSubfolders(rootId, allFolderIds, folderNames);

  const mimeQ = ALL_TYPES.map(m => `mimeType='${m}'`).join(' or ');
  let rawFiles = [];
  for (const chunk of chunkArray(allFolderIds, 10)) {
    const parentQ = chunk.map(id => `'${id}' in parents`).join(' or ');
    let pageToken = '';
    do {
      const res = await gapi.client.drive.files.list({
        q: `(${parentQ}) and (${mimeQ}) and trashed=false`,
        fields: 'nextPageToken,files(id,name,mimeType,size,modifiedTime,thumbnailLink,videoMediaMetadata,imageMediaMetadata,parents)',
        pageSize: 100, pageToken, orderBy: 'name'
      });
      rawFiles = rawFiles.concat(res.result.files || []);
      pageToken = res.result.nextPageToken || '';
    } while (pageToken);
  }

  // Deduplicar
  const seen = new Set();
  rawFiles = rawFiles.filter(f => { if (seen.has(f.id)) return false; seen.add(f.id); return true; });

  // Separar imágenes para usarlas como portadas
  const imageFiles = rawFiles.filter(f => IMAGE_TYPES.includes(f.mimeType));
  // Construir mapa: nombre_sin_ext → URL de la imagen
  imageFiles.forEach(img => {
    const key = img.name.replace(/\.[^/.]+$/, '').toLowerCase();
    // Preferimos thumbnailLink, si no usamos el viewer de Drive
    coverMap[key] = img.thumbnailLink
      ? img.thumbnailLink.replace('=s220', '=s400')
      : `https://drive.google.com/thumbnail?id=${img.id}&sz=s400`;
  });

  // Mapear archivos multimedia
  allFiles = rawFiles
    .filter(f => !IMAGE_TYPES.includes(f.mimeType))
    .map(f => {
      const folderId   = f.parents ? f.parents[0] : rootId;
      const nameClean  = f.name.replace(/\.[^/.]+$/, '');
      const coverKey   = nameClean.toLowerCase();
      const isVideo    = VIDEO_TYPES.includes(f.mimeType);
      const isAudio    = AUDIO_TYPES.includes(f.mimeType);
      // Portada: imagen con mismo nombre > thumbnail de Drive > null
      const cover = coverMap[coverKey] || f.thumbnailLink || null;
      return {
        ...f,
        folderId,
        folderName: folderNames[folderId] || ROOT_NAME,
        nameClean,
        cover,
        type: isVideo ? 'video' : isAudio ? 'audio' : 'other',
        duration: f.videoMediaMetadata ? formatDuration(f.videoMediaMetadata.durationMillis) : '',
        driveUrl:  `https://drive.google.com/file/d/${f.id}/view`,
        embedUrl:  `https://drive.google.com/file/d/${f.id}/preview`,
        streamUrl: `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,
      };
    });

  allVideos = allFiles.filter(f => f.type === 'video');
  allAudio  = allFiles.filter(f => f.type === 'audio');
  // Carpetas con contenido
  const allItems = [...allFiles];
  const folderIdsWithItems = [...new Set(allItems.map(f => f.folderId))];
  folders = folderIdsWithItems.map(fid => ({
    id: fid, name: folderNames[fid] || ROOT_NAME,
    count: allItems.filter(f => f.folderId === fid).length
  })).sort((a,b) => a.name.localeCompare(b.name));
}

async function collectSubfolders(parentId, result, nameMap) {
  const res = await gapi.client.drive.files.list({
    q: `'${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: 'files(id,name)', pageSize: 100
  });
  for (const sub of (res.result.files || [])) {
    result.push(sub.id); nameMap[sub.id] = sub.name;
    await collectSubfolders(sub.id, result, nameMap);
  }
}
function chunkArray(arr, size) { const c=[]; for(let i=0;i<arr.length;i+=size) c.push(arr.slice(i,i+size)); return c; }

// ── RENDER ──
function renderSidebar() {
  document.getElementById('sidebar-folders').innerHTML = folders.map(f =>
    `<div class="nav-item folder-item" onclick="setView('folder:${f.id}');closeSidebar()">
      <span class="nav-icon" style="font-size:12px">📁</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      <span class="folder-count">${f.count}</span>
    </div>`).join('');
}

function renderHomeView() {
  const hasVideos = allVideos.length > 0;
  const hasAudio  = allAudio.length  > 0;
  if (!hasVideos && !hasAudio) {
    document.getElementById('home-view').innerHTML = `<div class="empty-state"><div class="empty-icon">🎬</div><div>No encontré archivos en <strong style="color:var(--text)">${ROOT_NAME}</strong>.</div></div>`;
    return;
  }
  const recent = recentIds.map(id => allFiles.find(f => f.id === id)).filter(Boolean).slice(0,8);
  const featured = allVideos[Math.floor(Math.random() * Math.min(allVideos.length || 1, 10))];
  const heroThumb = featured?.cover || null;

  document.getElementById('home-view').innerHTML = `
    ${featured ? `
    <div id="hero">
      ${heroThumb ? `<img class="hero-bg-img" src="${heroThumb}" alt="" />` : ''}
      <div class="hero-glow"></div>
      <div class="hero-content">
        <div class="hero-tag">★ Destacado</div>
        <div class="hero-title">${esc(featured.nameClean)}</div>
        <div class="hero-meta">${esc(featured.folderName)}${featured.duration?' · '+featured.duration:''}</div>
        <button class="hero-play" onclick="openItem('${featured.id}')">▶ Reproducir</button>
      </div>
    </div>` : ''}
    ${recent.length ? `<div class="section-header"><span class="section-title">Recientes</span><span class="section-more" onclick="setView('recent')">Ver todos</span></div><div class="video-grid">${recent.map(mediaCardHtml).join('')}</div>` : ''}
    ${hasVideos ? `<div class="section-header"><span class="section-title">Videos</span><span class="section-more" onclick="setView('videos')">Ver todos (${allVideos.length})</span></div><div class="video-grid">${allVideos.slice(0,8).map(mediaCardHtml).join('')}</div>` : ''}
    ${hasAudio ? `<div class="section-header"><span class="section-title">Audio</span><span class="section-more" onclick="setView('audio')">Ver todos (${allAudio.length})</span></div><div class="video-grid">${allAudio.slice(0,8).map(mediaCardHtml).join('')}</div>` : ''}
    ${folders.length > 1 ? `<div class="section-header"><span class="section-title">Carpetas</span></div><div class="folder-pills">${folders.map(f=>`<div class="folder-pill" onclick="setView('folder:${f.id}')">📁 ${esc(f.name)} <span style="opacity:.5">${f.count}</span></div>`).join('')}</div>` : ''}
  `;
}

function mediaCardHtml(f) {
  const isFav = favorites.includes(f.id);
  const isAudio = f.type === 'audio';
  const thumbClass = isAudio ? 'card-thumb audio-square' : 'card-thumb';
  const thumbHtml = f.cover
    ? `<img src="${f.cover}" alt="" onerror="this.style.display='none'" />`
    : isAudio
      ? `<span style="font-size:38px;position:relative;z-index:1">🎵</span><div class="album-vinyl"></div>`
      : `<span style="font-size:30px">🎬</span>`;
  const badge = isAudio ? `<div class="card-type-badge">AUDIO</div>` : '';
  const albumLabel = isAudio ? `<div class="album-label"><div class="album-label-text">${esc(f.folderName)}</div></div>` : '';
  return `<div class="media-card">
    <div class="${thumbClass}" onclick="openItem('${f.id}')">
      ${thumbHtml}
      <div class="card-overlay"><div class="play-circle">${isAudio?'♪':'▶'}</div></div>
      ${f.duration ? `<div class="card-duration">${f.duration}</div>` : ''}
      ${badge}
      ${albumLabel}
    </div>
    <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${f.id}',event)">${isFav?'♥':'♡'}</button>
    <div class="card-info" onclick="openItem('${f.id}')">
      <div class="card-name" title="${esc(f.nameClean)}">${esc(f.nameClean)}</div>
      <div class="card-sub">${esc(f.folderName)}</div>
    </div>
  </div>`;
}


// ── VISTAS ──
function setView(view) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItems = document.querySelectorAll('.nav-item');
  if (view==='home')      { navItems[0].classList.add('active'); renderHomeView(); return; }
  if (view==='videos')    { navItems[1].classList.add('active'); renderMediaList('Videos', allVideos); return; }
  if (view==='audio')     { navItems[3].classList.add('active'); renderMediaList('Audio', allAudio); return; }
  if (view==='recent')    { navItems[3].classList.add('active'); renderMediaList('Recientes', recentIds.map(id=>allFiles.find(f=>f.id===id)).filter(Boolean)); return; }
  if (view==='favorites') { navItems[4].classList.add('active'); renderMediaList('Favoritos ♥', allFiles.filter(f=>favorites.includes(f.id))); return; }
  if (view.startsWith('folder:')) {
    const fid = view.split(':')[1];
    const folder = folders.find(f => f.id === fid);
    const items = allFiles.filter(f => f.folderId === fid);
    const vids  = items.filter(f => f.type==='video');
    const aud   = items.filter(f => f.type==='audio');
    let html = `<div class="section-title" style="margin-bottom:20px">${folder?esc(folder.name):'Carpeta'}</div>`;
    if (vids.length)  html += `<div class="section-header"><span class="section-title">Videos</span></div><div class="video-grid">${vids.map(mediaCardHtml).join('')}</div>`;
    if (aud.length)   html += `<div class="section-header"><span class="section-title">Audio</span></div><div class="video-grid">${aud.map(mediaCardHtml).join('')}</div>`;
    document.getElementById('home-view').innerHTML = html || `<div class="empty-state"><div class="empty-icon">📭</div><div>No hay archivos aquí</div></div>`;
  }
}

function renderMediaList(title, items) {
  document.getElementById('home-view').innerHTML = !items.length
    ? `<div class="section-title" style="margin-bottom:20px">${title}</div><div class="empty-state"><div class="empty-icon">📭</div><div>No hay archivos aquí</div></div>`
    : `<div class="section-header"><span class="section-title">${title}</span><span style="font-size:12px;color:var(--muted)">${items.length} archivos</span></div><div class="video-grid">${items.map(mediaCardHtml).join('')}</div>`;
}


// ── SIDEBAR MOBILE ──
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

// ── BÚSQUEDA ──
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { renderHomeView(); return; }
  renderMediaList(`"${this.value}"`, allFiles.filter(f => f.nameClean.toLowerCase().includes(q) || f.folderName.toLowerCase().includes(q)));
});

// ── FAVORITOS ──
function toggleFav(id, e) {
  if (e) e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(f=>f!==id) : [...favorites, id];
  localStorage.setItem('sv_favs', JSON.stringify(favorites));
  if (e) { const btn=e.currentTarget; btn.textContent=favorites.includes(id)?'♥':'♡'; btn.classList.toggle('active',favorites.includes(id)); }
  if (currentItem && currentItem.id===id) updateModalFavBtn();
}
function toggleFavCurrent() { if (currentItem) toggleFav(currentItem.id, null); }
function updateModalFavBtn() {
  if (!currentItem) return;
  const isFav = favorites.includes(currentItem.id);
  const btn = document.getElementById('modal-fav-btn');
  if (btn) { btn.textContent = isFav?'♥ Favorito':'♡ Favorito'; btn.classList.toggle('active',isFav); }
}

// ── ABRIR ITEM ──
function openItem(id) {
  const item = allFiles.find(f => f.id === id);
  if (!item) return;
  if (item.type === 'audio') { openAudio(item); return; }
  openVideo(item);
}

// ── VIDEO ──
function openVideo(item) {
  currentItem = item;
  currentPlaylist = allVideos; currentIdx = allVideos.findIndex(f=>f.id===item.id);
  updateRecent(item.id);
  updatePlayerBar(item);
  document.getElementById('modal-iframe').src = item.embedUrl;
  document.getElementById('modal-title').textContent = item.nameClean;
  document.getElementById('modal-sub-text').textContent = item.folderName + (item.duration?' · '+item.duration:'');
  document.getElementById('modal-gdrive-btn').href = item.driveUrl;
  updateModalFavBtn();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-iframe').src=''; }

// ── AUDIO ──
function openAudio(item) {
  currentItem = item;
  currentPlaylist = allAudio; currentIdx = allAudio.findIndex(f=>f.id===item.id);
  updateRecent(item.id);
  updatePlayerBar(item);
  // Cover
  const coverWrap = document.getElementById('audio-modal-cover-wrap');
  coverWrap.innerHTML = item.cover
    ? `<img id="audio-modal-cover" src="${item.cover}" alt="" />`
    : `<div id="audio-modal-cover-placeholder">🎵</div>`;
  document.getElementById('audio-modal-title').textContent = item.nameClean;
  document.getElementById('audio-modal-sub').textContent = item.folderName;
  const audioEl = document.getElementById('audio-el');
  audioEl.src = item.streamUrl + `&access_token=${accessToken}`;
  audioEl.load();
  document.getElementById('audio-modal').classList.add('open');
  audioEl.play().catch(()=>{});
}
function closeAudioModal() {
  document.getElementById('audio-modal').classList.remove('open');
  document.getElementById('audio-el').pause();
}
function toggleAudioPlay() {
  const a = document.getElementById('audio-el');
  if (a.paused) { a.play(); document.getElementById('audio-play-btn').textContent='⏸'; }
  else { a.pause(); document.getElementById('audio-play-btn').textContent='▶'; }
}
document.getElementById('audio-el').addEventListener('ended', () => nextItem());


// ── PLAYER BAR ──
function updatePlayerBar(item) {
  document.getElementById('player-title').textContent = item.nameClean;
  document.getElementById('player-sub').textContent = item.folderName;
  document.getElementById('player-thumb').innerHTML = item.cover ? `<img src="${item.cover}" alt="" />` : (item.type==='audio'?'🎵':'🎬');
}
function togglePlay() { if (currentItem) { if(currentItem.type==='audio') document.getElementById('audio-modal').classList.add('open'); else document.getElementById('modal').classList.add('open'); } }
function prevItem() { if (!currentPlaylist.length) return; currentIdx=(currentIdx-1+currentPlaylist.length)%currentPlaylist.length; const item=currentPlaylist[currentIdx]; if(item.type==='audio') openAudio(item); else openVideo(item); }
function nextItem() { if (!currentPlaylist.length) return; currentIdx=(currentIdx+1)%currentPlaylist.length; const item=currentPlaylist[currentIdx]; if(item.type==='audio') openAudio(item); else openVideo(item); }

function updateRecent(id) {
  recentIds = [id, ...recentIds.filter(x=>x!==id)].slice(0,20);
  localStorage.setItem('sv_recent', JSON.stringify(recentIds));
}

// ── TECLADO ──
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeModal(); closeAudioModal(); }
});
document.getElementById('modal').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
document.getElementById('audio-modal').addEventListener('click', function(e) { if(e.target===this) closeAudioModal(); });

// ── UTILS ──
function formatDuration(ms) { if(!ms)return''; const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60); return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${m}:${String(s%60).padStart(2,'0')}`; }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
